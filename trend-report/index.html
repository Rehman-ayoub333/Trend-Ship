<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRENDSHIP | 2025 Trend Report — LX Hausys</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
<script src="../js/site-config.js"></script>
<style>
:root{
  --greige:#d4c4bc; --dark:#0a0a0a; --off-white:#f4efe9;
  --rose:#d4857a; --text-dark:#1a1614; --text-light:#f0e8e0;
  --ff-display:'Bebas Neue',sans-serif; --ff-body:'EB Garamond',serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--off-white);color:var(--text-dark);font-family:var(--ff-body);overflow-x:hidden}
#nav{position:fixed;top:0;left:0;width:100%;padding:24px 56px;display:flex;justify-content:space-between;align-items:center;z-index:800}
.n-logo{font-family:var(--ff-display);font-size:18px;letter-spacing:.14em}
.n-maison{font-family:var(--ff-body);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--rose);text-decoration:none;opacity:.8;transition:opacity .2s}
.n-maison:hover{opacity:1}
#hero{height:70vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:var(--greige);padding:0 24px}
.h-title{font-family:var(--ff-display);font-size:clamp(60px,10vw,140px);line-height:.9;margin-bottom:20px}
#form-section{padding:100px 24px;max-width:500px;margin:0 auto}
.input-group{margin-bottom:30px}
input{width:100%;padding:12px;border:none;border-bottom:1px solid rgba(0,0,0,.1);background:transparent;font-family:inherit;font-size:16px;outline:none}
button{width:100%;padding:16px;background:var(--dark);color:#fff;border-radius:40px;font-size:12px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer}
footer{padding:72px 56px;background:var(--dark);color:var(--text-light);text-align:center}
</style>
</head>
<body>
<nav id="nav"><a href="../index.html" class="n-logo">TRENDSHIP</a><a href="../admin/login.html" class="n-maison" title="Maison Atelier">Maison</a></nav>
<main>
  <section id="hero">
    <h1 class="h-title">2025 TREND<br>REPORT</h1>
    <p>Exclusive insights into the future of surface design.</p>
  </section>
  <section id="form-section">
    <form id="downloadForm">
      <div class="input-group"><input type="text" id="dlName" placeholder="Name" required></div>
      <div class="input-group"><input type="email" id="dlEmail" placeholder="Email Address" required></div>
      <div class="input-group"><input type="text" id="dlCompany" placeholder="Company"></div>
      <button type="submit">Download PDF (14MB)</button>
    </form>
  </section>
</main>
<footer>© 2025 LX Hausys.</footer>
<script>
const lenis = new Lenis();
function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
requestAnimationFrame(raf);

document.getElementById('downloadForm').onsubmit = async e => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.textContent = 'Preparing...';
  
  const payload = {
    name:    document.getElementById('dlName').value,
    email:   document.getElementById('dlEmail').value,
    company: document.getElementById('dlCompany').value
  };

  try {
    const res = await fetch('../api/downloads/index.php', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if(data.success) {
      btn.textContent = 'Redirecting...';
      window.location.href = data.pdf_url;
    } else {
      alert(data.error);
      btn.textContent = 'Download PDF (14MB)';
    }
  } catch {
    alert('Error connecting to server.');
    btn.textContent = 'Download PDF (14MB)';
  }
};
</script>
</body>
</html>
